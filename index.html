<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MinePhoto ⛏️</title>
<meta name="description" content="Zamień swoje zdjęcia w świat Minecraft!">
<meta name="theme-color" content="#2d1a0e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --mc-dirt: #8B6914;
  --mc-dirt-dark: #5C4A0E;
  --mc-grass: #5D8C2E;
  --mc-grass-light: #7BBC3A;
  --mc-stone: #7F7F7F;
  --mc-wood: #6B4226;
  --mc-wood-light: #9C6B3C;
  --mc-sky: #87CEEB;
  --mc-night: #1a0e2e;
  --mc-gold: #FFD700;
  --mc-diamond: #4AEDD9;
  --mc-red: #C62828;
  --mc-white: #F5F0E1;
  --mc-dark: #2d1a0e;
  --mc-bg: #3a2a14;
  --pixel: 4px;
}

html, body {
  height: 100%;
  overflow-x: hidden;
}

body {
  font-family: 'Nunito', sans-serif;
  background: var(--mc-dark);
  color: var(--mc-white);
  min-height: 100dvh;
  position: relative;
}

/* Minecraft dirt texture background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    repeating-conic-gradient(#4a3520 0% 25%, transparent 0% 50%) 0 0 / 16px 16px,
    repeating-conic-gradient(#3d2a15 0% 25%, transparent 0% 50%) 8px 8px / 16px 16px,
    linear-gradient(180deg, #3a2a14, #2d1a0e);
  opacity: 0.6;
  z-index: 0;
}

.app {
  position: relative;
  z-index: 1;
  max-width: 500px;
  margin: 0 auto;
  padding: 16px;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}

/* ---- HEADER ---- */
.header {
  text-align: center;
  padding: 20px 0 10px;
}

.logo {
  font-family: 'Silkscreen', monospace;
  font-size: 2.2rem;
  color: var(--mc-grass-light);
  text-shadow:
    3px 3px 0 var(--mc-dirt-dark),
    -1px -1px 0 #000,
    1px -1px 0 #000,
    -1px 1px 0 #000,
    1px 1px 0 #000;
  letter-spacing: 2px;
  animation: titleBounce 0.6s ease-out;
}

.logo span { color: var(--mc-gold); }

.subtitle {
  font-family: 'Silkscreen', monospace;
  font-size: 0.75rem;
  color: var(--mc-wood-light);
  margin-top: 4px;
  letter-spacing: 1px;
}

@keyframes titleBounce {
  0% { transform: scale(0.5) translateY(-30px); opacity: 0; }
  60% { transform: scale(1.05); }
  100% { transform: scale(1) translateY(0); opacity: 1; }
}

/* ---- SCREENS ---- */
.screen { display: none; flex-direction: column; flex: 1; gap: 16px; }
.screen.active { display: flex; }

/* ---- UPLOAD AREA ---- */
.upload-zone {
  border: 4px dashed var(--mc-grass);
  border-radius: 8px;
  padding: 40px 20px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  background: rgba(93, 140, 46, 0.08);
  position: relative;
  overflow: hidden;
}

.upload-zone:hover, .upload-zone:active {
  background: rgba(93, 140, 46, 0.18);
  border-color: var(--mc-grass-light);
  transform: scale(1.01);
}

.upload-zone .pickaxe {
  font-size: 3.5rem;
  display: block;
  margin-bottom: 12px;
  animation: swing 1.5s ease-in-out infinite;
}

@keyframes swing {
  0%, 100% { transform: rotate(-10deg); }
  50% { transform: rotate(10deg); }
}

.upload-zone p {
  font-family: 'Silkscreen', monospace;
  font-size: 0.9rem;
  color: var(--mc-grass-light);
}

.upload-zone small {
  display: block;
  margin-top: 8px;
  color: var(--mc-wood-light);
  font-size: 0.8rem;
}

input[type="file"] { display: none; }

/* ---- PREVIEW ---- */
.preview-container {
  position: relative;
  border-radius: 8px;
  overflow: hidden;
  border: 4px solid var(--mc-wood);
  background: #000;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5), inset 0 0 30px rgba(0,0,0,0.3);
}

.preview-container img, .preview-container canvas {
  display: block;
  width: 100%;
  height: auto;
  max-height: 55vh;
  object-fit: contain;
}

/* ---- DETECTION BADGE ---- */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 18px;
  border-radius: 6px;
  font-family: 'Silkscreen', monospace;
  font-size: 0.85rem;
  background: linear-gradient(135deg, rgba(93,140,46,0.3), rgba(93,140,46,0.1));
  border: 2px solid var(--mc-grass);
  animation: badgePop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.badge .icon { font-size: 1.3rem; }

@keyframes badgePop {
  0% { transform: scale(0); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

/* ---- MODE SELECTOR ---- */
.mode-selector {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.mode-btn {
  font-family: 'Silkscreen', monospace;
  font-size: 0.7rem;
  padding: 14px 10px;
  border: 3px solid var(--mc-wood);
  border-radius: 6px;
  background: var(--mc-bg);
  color: var(--mc-white);
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
  line-height: 1.4;
}

.mode-btn:hover { border-color: var(--mc-grass); background: rgba(93,140,46,0.15); }
.mode-btn.selected {
  border-color: var(--mc-grass-light);
  background: rgba(93,140,46,0.25);
  box-shadow: 0 0 12px rgba(93,140,46,0.3);
}

.mode-btn .mode-icon { font-size: 1.8rem; display: block; margin-bottom: 6px; }
.mode-btn .mode-label { color: var(--mc-grass-light); }

/* ---- API KEY ---- */
.api-key-section {
  display: none;
  gap: 8px;
  flex-direction: column;
}

.api-key-section.visible { display: flex; }

.api-key-section label {
  font-family: 'Silkscreen', monospace;
  font-size: 0.7rem;
  color: var(--mc-wood-light);
}

.api-key-section input {
  padding: 10px 14px;
  border: 2px solid var(--mc-wood);
  border-radius: 6px;
  background: rgba(0,0,0,0.3);
  color: var(--mc-white);
  font-size: 0.85rem;
  font-family: monospace;
  outline: none;
}

.api-key-section input:focus { border-color: var(--mc-diamond); }

.api-hint {
  font-size: 0.7rem;
  color: var(--mc-stone);
  line-height: 1.4;
}

/* ---- BUTTONS ---- */
.btn {
  font-family: 'Silkscreen', monospace;
  font-size: 0.85rem;
  padding: 16px 24px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
  text-transform: uppercase;
  letter-spacing: 1px;
  position: relative;
  overflow: hidden;
}

.btn:active { transform: scale(0.97); }

.btn-primary {
  background: linear-gradient(180deg, var(--mc-grass-light) 0%, var(--mc-grass) 100%);
  color: #fff;
  text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
  border-bottom: 4px solid #3d6b1a;
  font-size: 1rem;
}

.btn-primary:hover { filter: brightness(1.1); }
.btn-primary:active { border-bottom-width: 2px; margin-top: 2px; }

.btn-primary:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  filter: grayscale(0.5);
}

.btn-secondary {
  background: linear-gradient(180deg, var(--mc-wood-light) 0%, var(--mc-wood) 100%);
  color: var(--mc-white);
  border-bottom: 3px solid #4a2a12;
}

.btn-gold {
  background: linear-gradient(180deg, #FFE44D 0%, #FFD700 50%, #DAA520 100%);
  color: var(--mc-dark);
  border-bottom: 4px solid #B8860B;
  font-size: 1rem;
}

.btn-diamond {
  background: linear-gradient(180deg, #7FFFFF 0%, var(--mc-diamond) 50%, #2BB5A8 100%);
  color: var(--mc-dark);
  border-bottom: 4px solid #1a8a7e;
}

.btn-row {
  display: flex;
  gap: 10px;
}

.btn-row .btn { flex: 1; }

/* ---- PROGRESS ---- */
.progress-section {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  padding: 30px 0;
}

.progress-section.active { display: flex; }

.progress-bar-track {
  width: 100%;
  height: 20px;
  background: rgba(0,0,0,0.4);
  border-radius: 4px;
  border: 2px solid var(--mc-wood);
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  background: repeating-linear-gradient(
    90deg,
    var(--mc-grass-light) 0px,
    var(--mc-grass-light) 14px,
    var(--mc-grass) 14px,
    var(--mc-grass) 16px
  );
  border-radius: 2px;
  width: 0%;
  transition: width 0.3s;
}

.progress-text {
  font-family: 'Silkscreen', monospace;
  font-size: 0.8rem;
  color: var(--mc-grass-light);
  text-align: center;
}

.crafting-anim {
  font-size: 2.5rem;
  animation: craftSpin 1s linear infinite;
}

@keyframes craftSpin {
  0% { transform: rotateY(0deg); }
  100% { transform: rotateY(360deg); }
}

/* ---- RESULT ---- */
.result-label {
  font-family: 'Silkscreen', monospace;
  font-size: 0.8rem;
  color: var(--mc-gold);
  text-align: center;
}

.comparison {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.comparison .preview-container { border-width: 3px; }
.comparison .comp-label {
  font-family: 'Silkscreen', monospace;
  font-size: 0.6rem;
  text-align: center;
  padding: 4px;
  color: var(--mc-wood-light);
}

/* ---- AI RESULT IMAGE ---- */
.ai-result-img {
  border-radius: 8px;
  border: 4px solid var(--mc-gold);
  box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
}

/* ---- INSTALL BANNER ---- */
.install-banner {
  display: none;
  padding: 12px 16px;
  background: linear-gradient(135deg, rgba(74,237,217,0.15), rgba(74,237,217,0.05));
  border: 2px solid var(--mc-diamond);
  border-radius: 6px;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  animation: badgePop 0.5s ease-out;
}

.install-banner.visible { display: flex; }
.install-banner .install-text {
  font-family: 'Silkscreen', monospace;
  font-size: 0.65rem;
  color: var(--mc-diamond);
  flex: 1;
}

/* ---- FOOTER ---- */
.footer {
  text-align: center;
  padding: 20px 0 10px;
  font-size: 0.7rem;
  color: var(--mc-wood);
}

/* Responsive */
@media (max-width: 380px) {
  .logo { font-size: 1.7rem; }
  .mode-btn { padding: 10px 6px; font-size: 0.6rem; }
  .btn { padding: 14px 16px; font-size: 0.8rem; }
}
</style>
</head>
<body>

<div class="app">
  <header class="header">
    <div class="logo">Mine<span>Photo</span> ⛏️</div>
    <div class="subtitle">Zamień zdjęcie w Minecraft!</div>
  </header>

  <!-- INSTALL BANNER -->
  <div class="install-banner" id="installBanner" onclick="installApp()">
    <span style="font-size:1.5rem">📲</span>
    <span class="install-text">Zainstaluj na telefonie!</span>
  </div>

  <!-- SCREEN 1: UPLOAD -->
  <div class="screen active" id="screenUpload">
    <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
      <span class="pickaxe">⛏️</span>
      <p>Kliknij aby dodać zdjęcie!</p>
      <small>📸 Zrób fotkę lub wybierz z galerii</small>
    </div>
    <input type="file" id="fileInput" accept="image/*" capture="environment">
  </div>

  <!-- SCREEN 2: PREVIEW + TRANSFORM -->
  <div class="screen" id="screenPreview">
    <div class="preview-container">
      <img id="previewImg" src="" alt="Podgląd zdjęcia">
    </div>

    <div class="badge" id="detectionBadge">
      <span class="icon" id="detectionIcon">🔍</span>
      <span id="detectionText">Wykrywanie...</span>
    </div>

    <div class="mode-selector">
      <button class="mode-btn selected" data-mode="pixel" onclick="selectMode('pixel')">
        <span class="mode-icon">🧱</span>
        <span class="mode-label">Pikselowy filtr</span><br>
        <small style="color:var(--mc-stone);font-size:0.55rem">Szybki i darmowy</small>
      </button>
      <button class="mode-btn" data-mode="ai" onclick="selectMode('ai')">
        <span class="mode-icon">🤖</span>
        <span class="mode-label">AI Minecraft</span><br>
        <small style="color:var(--mc-stone);font-size:0.55rem">Wymaga klucza API</small>
      </button>
    </div>

    <div class="api-key-section" id="apiKeySection">
      <label>🔑 Klucz API Anthropic:</label>
      <input type="password" id="apiKeyInput" placeholder="sk-ant-...">
      <div class="api-hint">Klucz potrzebny do trybu AI. Możesz go zdobyć na console.anthropic.com</div>
    </div>

    <button class="btn btn-primary" id="transformBtn" onclick="startTransform()">
      ⛏️ Zamień na Minecraft!
    </button>

    <button class="btn btn-secondary" onclick="resetApp()">
      ← Nowe zdjęcie
    </button>
  </div>

  <!-- SCREEN 3: PROCESSING -->
  <div class="screen" id="screenProcessing">
    <div class="progress-section active">
      <div class="crafting-anim">⛏️</div>
      <div class="progress-text" id="progressText">Kopiemy piksele...</div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
    </div>
  </div>

  <!-- SCREEN 4: RESULT -->
  <div class="screen" id="screenResult">
    <div class="result-label">✨ Gotowe! ✨</div>

    <div id="resultArea"></div>

    <div class="btn-row">
      <button class="btn btn-gold" onclick="saveResult()">
        💾 Zapisz
      </button>
      <button class="btn btn-diamond" onclick="resetApp()">
        🔄 Nowe
      </button>
    </div>
  </div>

  <footer class="footer">
    Zrobione przez Adama i Tatę ⛏️❤️
  </footer>
</div>

<!-- HIDDEN CANVASES -->
<canvas id="pixelCanvas" style="display:none"></canvas>

<script>
// ========== STATE ==========
let currentMode = 'pixel';
let originalImage = null;
let resultDataUrl = null;
let deferredPrompt = null;

// ========== PWA INSTALL ==========
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').classList.add('visible');
});

function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      document.getElementById('installBanner').classList.remove('visible');
    });
  }
}

// ========== NAVIGATION ==========
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function resetApp() {
  showScreen('screenUpload');
  document.getElementById('fileInput').value = '';
  originalImage = null;
  resultDataUrl = null;
}

// ========== MODE SELECTION ==========
function selectMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('selected'));
  document.querySelector(`[data-mode="${mode}"]`).classList.add('selected');
  document.getElementById('apiKeySection').classList.toggle('visible', mode === 'ai');
}

// ========== FILE UPLOAD ==========
document.getElementById('fileInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(ev) {
    originalImage = ev.target.result;
    document.getElementById('previewImg').src = originalImage;
    showScreen('screenPreview');
    detectContent(originalImage);
  };
  reader.readAsDataURL(file);
});

// ========== DETECTION ==========
function detectContent(imgSrc) {
  const badge = document.getElementById('detectionBadge');
  const icon = document.getElementById('detectionIcon');
  const text = document.getElementById('detectionText');

  icon.textContent = '🔍';
  text.textContent = 'Analizuję zdjęcie...';

  // Simple heuristic detection based on image colors
  const img = new Image();
  img.onload = function() {
    const c = document.createElement('canvas');
    const ctx = c.getContext('2d');
    c.width = 100; c.height = 100;
    ctx.drawImage(img, 0, 0, 100, 100);
    const data = ctx.getImageData(0, 0, 100, 100).data;

    // Analyze color distribution
    let skinTones = 0, greens = 0, blues = 0, grays = 0;
    let totalPixels = 100 * 100;

    for (let i = 0; i < data.length; i += 4) {
      const r = data[i], g = data[i+1], b = data[i+2];
      // Skin tone detection
      if (r > 95 && g > 40 && b > 20 && r > g && r > b && Math.abs(r - g) > 15 && r - b > 15) skinTones++;
      if (g > r && g > b && g > 80) greens++;
      if (b > r && b > g && b > 100) blues++;
      if (Math.abs(r - g) < 20 && Math.abs(g - b) < 20 && r > 60 && r < 200) grays++;
    }

    let skinPct = skinTones / totalPixels;
    let greenPct = greens / totalPixels;
    let bluePct = blues / totalPixels;
    let grayPct = grays / totalPixels;

    setTimeout(() => {
      if (skinPct > 0.12) {
        icon.textContent = '🧑';
        text.textContent = 'Wykryto: Człowiek! 👤';
      } else if (greenPct > 0.2 && bluePct > 0.1) {
        icon.textContent = '🌍';
        text.textContent = 'Wykryto: Świat na zewnątrz! 🌲';
      } else if (greenPct > 0.15) {
        icon.textContent = '🌿';
        text.textContent = 'Wykryto: Rośliny / Przyroda! 🌳';
      } else if (grayPct > 0.3) {
        icon.textContent = '🏠';
        text.textContent = 'Wykryto: Pokój / Budynek! 🏗️';
      } else if (bluePct > 0.2) {
        icon.textContent = '🌊';
        text.textContent = 'Wykryto: Woda / Niebo! ☁️';
      } else {
        icon.textContent = '📦';
        text.textContent = 'Wykryto: Przedmiot! 🎁';
      }
      badge.style.animation = 'none';
      badge.offsetHeight; // reflow
      badge.style.animation = 'badgePop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
    }, 800);
  };
  img.src = imgSrc;
}

// ========== TRANSFORM ==========
function startTransform() {
  if (currentMode === 'ai') {
    const key = document.getElementById('apiKeyInput').value.trim();
    if (!key) {
      alert('Wpisz klucz API Anthropic dla trybu AI! 🔑');
      return;
    }
    startAITransform(key);
  } else {
    startPixelTransform();
  }
}

// ---- PIXEL FILTER ----
function startPixelTransform() {
  showScreen('screenProcessing');
  const progressFill = document.getElementById('progressFill');
  const progressText = document.getElementById('progressText');

  const messages = [
    'Kopiemy piksele... ⛏️',
    'Zamieniamy bloki... 🧱',
    'Craftujemy tekstury... 🎨',
    'Stawiamy bloki... 🏗️',
    'Prawie gotowe! ✨'
  ];

  let progress = 0;
  const interval = setInterval(() => {
    progress += Math.random() * 15 + 5;
    if (progress > 100) progress = 100;
    progressFill.style.width = progress + '%';
    progressText.textContent = messages[Math.min(Math.floor(progress / 25), messages.length - 1)];

    if (progress >= 100) {
      clearInterval(interval);
      setTimeout(() => applyPixelFilter(), 300);
    }
  }, 200);
}

function applyPixelFilter() {
  const img = new Image();
  img.onload = function() {
    const canvas = document.getElementById('pixelCanvas');
    const ctx = canvas.getContext('2d');

    // Target pixel size for Minecraft look
    const PIXEL_SIZE = 8;
    const smallW = Math.ceil(img.width / PIXEL_SIZE);
    const smallH = Math.ceil(img.height / PIXEL_SIZE);

    canvas.width = img.width;
    canvas.height = img.height;

    // Draw small
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = smallW;
    tempCanvas.height = smallH;
    const tempCtx = tempCanvas.getContext('2d');
    tempCtx.imageSmoothingEnabled = false;
    tempCtx.drawImage(img, 0, 0, smallW, smallH);

    // Map colors to Minecraft palette
    const mcColors = [
      [86, 125, 42],   // grass
      [42, 100, 30],   // dark grass
      [139, 105, 20],  // dirt
      [92, 74, 14],    // dark dirt
      [127, 127, 127], // stone
      [100, 100, 100], // dark stone
      [64, 64, 64],    // coal
      [107, 66, 38],   // wood
      [156, 107, 60],  // light wood
      [135, 206, 235], // sky blue
      [60, 140, 200],  // water
      [30, 70, 140],   // deep water
      [200, 200, 200], // snow/white
      [255, 215, 0],   // gold
      [74, 237, 217],  // diamond
      [198, 40, 40],   // redstone
      [245, 240, 225], // white
      [30, 30, 30],    // obsidian
      [160, 100, 60],  // sand
      [220, 180, 100], // sandstone
      [50, 80, 50],    // dark leaf
      [80, 50, 30],    // dark wood
      [180, 160, 140], // birch
      [60, 180, 60],   // bright green
      [200, 120, 60],  // orange terracotta
      [140, 90, 80],   // red terracotta
    ];

    function nearestMC(r, g, b) {
      let minDist = Infinity, best = mcColors[0];
      for (const c of mcColors) {
        const dr = r - c[0], dg = g - c[1], db = b - c[2];
        const dist = dr*dr + dg*dg + db*db;
        if (dist < minDist) { minDist = dist; best = c; }
      }
      return best;
    }

    const imageData = tempCtx.getImageData(0, 0, smallW, smallH);
    for (let i = 0; i < imageData.data.length; i += 4) {
      const mc = nearestMC(imageData.data[i], imageData.data[i+1], imageData.data[i+2]);
      imageData.data[i] = mc[0];
      imageData.data[i+1] = mc[1];
      imageData.data[i+2] = mc[2];
    }
    tempCtx.putImageData(imageData, 0, 0);

    // Scale up pixelated
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(tempCanvas, 0, 0, img.width, img.height);

    // Draw grid lines for block effect
    ctx.strokeStyle = 'rgba(0,0,0,0.15)';
    ctx.lineWidth = 1;
    for (let x = 0; x < img.width; x += PIXEL_SIZE) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, img.height); ctx.stroke();
    }
    for (let y = 0; y < img.height; y += PIXEL_SIZE) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(img.width, y); ctx.stroke();
    }

    resultDataUrl = canvas.toDataURL('image/png');
    showResult('pixel');
  };
  img.src = originalImage;
}

// ---- AI TRANSFORM ----
async function startAITransform(apiKey) {
  showScreen('screenProcessing');
  const progressFill = document.getElementById('progressFill');
  const progressText = document.getElementById('progressText');

  progressFill.style.width = '20%';
  progressText.textContent = 'Wysyłam do AI... 🤖';

  try {
    const base64Data = originalImage.split(',')[1];
    const mediaType = originalImage.split(';')[0].split(':')[1];

    progressFill.style.width = '40%';
    progressText.textContent = 'AI analizuje zdjęcie... 🧠';

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1500,
        messages: [{
          role: 'user',
          content: [
            {
              type: 'image',
              source: { type: 'base64', media_type: mediaType, data: base64Data }
            },
            {
              type: 'text',
              text: `Jesteś ekspertem od Minecrafta. Przeanalizuj to zdjęcie i odpowiedz PO POLSKU w formacie JSON (tylko JSON, bez markdown):
{
  "type": "human" | "room" | "outdoor" | "object",
  "type_pl": "opis po polsku co widzisz (np. 'Człowiek', 'Pokój', 'Krajobraz')",
  "description": "Krótki opis po polsku co widzisz na zdjęciu (1-2 zdania)",
  "minecraft_description": "Opisz jak to zdjęcie wyglądałoby w świecie Minecraft. Jakie bloki by użyto? Jak wyglądałaby scena? (2-3 zdania, po polsku, ekscytująco dla 6-latka)",
  "minecraft_blocks": ["lista 5 bloków Minecraft które pasują do tego zdjęcia"],
  "fun_fact": "Jedna ciekawostka z Minecrafta związana z tym co jest na zdjęciu (po polsku, ciekawa dla dziecka)"
}`
            }
          ]
        }]
      })
    });

    progressFill.style.width = '70%';
    progressText.textContent = 'Budujemy świat... 🏗️';

    const data = await response.json();

    if (data.error) {
      throw new Error(data.error.message || 'Błąd API');
    }

    const text = data.content[0].text;
    let aiResult;
    try {
      aiResult = JSON.parse(text.replace(/```json|```/g, '').trim());
    } catch {
      aiResult = {
        type_pl: 'Coś ciekawego',
        description: text.substring(0, 200),
        minecraft_description: 'AI opisał to zdjęcie ale nie w formacie JSON.',
        minecraft_blocks: ['Stone', 'Dirt', 'Grass'],
        fun_fact: 'Steve może nieść miliony ton w swoim ekwipunku!'
      };
    }

    progressFill.style.width = '90%';
    progressText.textContent = 'Craftujemy wynik... ✨';

    // Also create pixel version
    await createPixelVersion();

    progressFill.style.width = '100%';

    setTimeout(() => showAIResult(aiResult), 500);

  } catch (err) {
    alert('Ups! Błąd: ' + err.message + '\n\nSprawdź czy klucz API jest poprawny! 🔑');
    showScreen('screenPreview');
  }
}

function createPixelVersion() {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = function() {
      const canvas = document.getElementById('pixelCanvas');
      const ctx = canvas.getContext('2d');
      const PIXEL_SIZE = 8;
      const smallW = Math.ceil(img.width / PIXEL_SIZE);
      const smallH = Math.ceil(img.height / PIXEL_SIZE);
      canvas.width = img.width;
      canvas.height = img.height;

      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = smallW;
      tempCanvas.height = smallH;
      const tempCtx = tempCanvas.getContext('2d');
      tempCtx.imageSmoothingEnabled = false;
      tempCtx.drawImage(img, 0, 0, smallW, smallH);

      const mcColors = [
        [86,125,42],[42,100,30],[139,105,20],[92,74,14],[127,127,127],
        [100,100,100],[64,64,64],[107,66,38],[156,107,60],[135,206,235],
        [60,140,200],[30,70,140],[200,200,200],[255,215,0],[74,237,217],
        [198,40,40],[245,240,225],[30,30,30],[160,100,60],[220,180,100],
        [50,80,50],[80,50,30],[180,160,140],[60,180,60],[200,120,60],[140,90,80]
      ];

      function nearestMC(r,g,b) {
        let minDist=Infinity, best=mcColors[0];
        for(const c of mcColors){const dr=r-c[0],dg=g-c[1],db=b-c[2],dist=dr*dr+dg*dg+db*db;if(dist<minDist){minDist=dist;best=c;}}
        return best;
      }

      const imageData = tempCtx.getImageData(0,0,smallW,smallH);
      for(let i=0;i<imageData.data.length;i+=4){
        const mc=nearestMC(imageData.data[i],imageData.data[i+1],imageData.data[i+2]);
        imageData.data[i]=mc[0];imageData.data[i+1]=mc[1];imageData.data[i+2]=mc[2];
      }
      tempCtx.putImageData(imageData,0,0);
      ctx.imageSmoothingEnabled=false;
      ctx.drawImage(tempCanvas,0,0,img.width,img.height);

      ctx.strokeStyle='rgba(0,0,0,0.15)';ctx.lineWidth=1;
      for(let x=0;x<img.width;x+=PIXEL_SIZE){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,img.height);ctx.stroke();}
      for(let y=0;y<img.height;y+=PIXEL_SIZE){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(img.width,y);ctx.stroke();}

      resultDataUrl = canvas.toDataURL('image/png');
      resolve();
    };
    img.src = originalImage;
  });
}

      </div>

    <div class="comparison">

        <div class="preview-container"><img src="${originalImage}" alt="Oryginał"></div>
        <div class="comp-label">Oryginał 📸</div>

      <div>

}

// ========== SAVE ==========
function saveResult() {
  if (!resultDataUrl) return;
  const a = document.createElement('a');
  a.href = resultDataUrl;
  a.download = 'minecraft-photo-' + Date.now() + '.png';
  a.click();
}
